<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PDF Text Extractor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #fffaf6;
    }
    h2 {
      color: #333;
    }
    pre {
      white-space: pre-wrap;
      background: #f4f4f4;
      padding: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h2>Upload a file to extract its content</h2>
  <input type="file" id="upload" accept=".pdf" />
  <h3>Extracted text is:</h3>
  <pre id="output"></pre>

  <script>
    document.getElementById('upload').addEventListener('change', async function (e) {
      const file = e.target.files[0];
      if (!file || file.type !== "application/pdf") return;

      const reader = new FileReader();
      reader.onload = async function () {
        const typedarray = new Uint8Array(this.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        let fullText = "";

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const content = await page.getTextContent();
          const items = content.items;

          let lines = [];
          let line = [];
          let currentY = null;

          items.forEach(item => {
            const y = item.transform[5];
            if (currentY === null) currentY = y;

            if (Math.abs(y - currentY) > 2) {
              lines.push(line.join(' '));
              line = [];
              currentY = y;
            }
            line.push(item.str);
          });

          if (line.length > 0) {
            lines.push(line.join(' '));
          }

          fullText += `--- Page ${pageNum} ---\n` + lines.join('\n') + "\n\n";
        }

        document.getElementById('output').textContent = fullText;
      };
      reader.readAsArrayBuffer(file);
    });
  </script>
</body>
</html>
