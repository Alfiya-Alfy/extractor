<!DOCTYPE html>
<html>
<head>
  <title>PDF Extractor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container py-5">
    <h2 class="mb-4">PDF Extractor Page 1</h2>

    <input type="file" id="upload" class="form-control mb-3" accept="application/pdf" />
    <pre id="output" class="p-3 bg-white border" style="min-height: 200px;"></pre>

    <a href="/alt" class="btn btn-secondary mt-3">Go to Page 2</a>
  </div>

  <script>
    document.getElementById('upload').addEventListener('change', async function (e) {
      const file = e.target.files[0];
      const formData = new FormData();
      formData.append("file", file);

      const response = await fetch("/extract", {
        method: "POST",
        body: formData,
      });

      const result = await response.json();
      document.getElementById('output').textContent = JSON.stringify(result, null, 2);
    });
  </script>
</body>
</html>
