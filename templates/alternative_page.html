<!DOCTYPE html>
<html>
<head>
  <title>PDF Extractor - Page 2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-dark text-white">
  <div class="container py-5">
    <h2 class="mb-4">PDF Extractor Page 2</h2>

    <input type="file" id="upload2" class="form-control mb-3" accept="application/pdf" />
    <pre id="output2" class="p-3 bg-white text-dark" style="min-height: 200px;"></pre>

    <a href="/" class="btn btn-light mt-3">Back to Page 1</a>
  </div>

  <script>
    document.getElementById('upload2').addEventListener('change', async function (e) {
      const file = e.target.files[0];
      const formData = new FormData();
      formData.append("file", file);

      const response = await fetch("/extract", {
        method: "POST",
        body: formData,
      });

      const result = await response.json();
      document.getElementById('output2').textContent = JSON.stringify(result, null, 2);
    });
  </script>
</body>
</html>
